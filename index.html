<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>broken</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <section class="screen active" id="screen-1">
      <img src="assets/hielo-inicio.png" alt="Pantalla inicial" class="bg" />
      <div class="overlay start-overlay">
        <button id="startBtn" class="btn">Empezar</button>
      </div>
    </section>

    <section class="screen" id="screen-2">
      <img src="assets/hielo-tocalo.png" alt="Tócalo" class="bg" />
      <button id="touchBtn" class="hotspot" aria-label="Tocar"></button>
    </section>

    <section class="screen" id="screen-3">
      <img src="assets/hielo-pena.png" alt="Uy le dio pena" class="bg" />
      <button id="finalBtn" class="hotspot" aria-label="Continuar"></button>
    </section>

    <section class="screen" id="screen-4">
      <img src="assets/hielo-final.png" alt="Final" class="bg" />
      <div class="overlay final-overlay">
        <h2>Gracias por ayudarme a romper el hielo</h2>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
